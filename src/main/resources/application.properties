# ── Server ──────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── Database (Railway injects DATABASE_URL automatically) ───────────────────
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── JWT ──────────────────────────────────────────────────────────────────────
# Set JWT_SECRET in Railway as a plain string (min 32 chars).
# We read it here and encode it in JwtUtil — do NOT pre-encode on Railway.
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ── CORS ─────────────────────────────────────────────────────────────────────
# Set this to your Vercel frontend URL in Railway env vars
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.swahili=DEBUG
logging.level.org.springframework.security=WARN
spring.main.allow-circular-references=true