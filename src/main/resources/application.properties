# ── Server ──────────────────────────────────────────────────────────────────

server.port=${PORT:8080}

# ── Database (Railway MySQL) ────────────────────────────────────────────────

spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ─────────────────────────────────────────────────────────

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── JSON (IMPORTANT for LocalDateTime) ──────────────────────────────────────

spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false

# ── JWT (keep for future use) ───────────────────────────────────────────────

jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ── CORS ────────────────────────────────────────────────────────────────────

# Set this in Railway → your Vercel frontend URL

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:[http://localhost:5173}](http://localhost:5173})

# ── Logging ─────────────────────────────────────────────────────────────────

logging.level.com.yourapp=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

spring.main.allow-circular-references=true
